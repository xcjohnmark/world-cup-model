name: Auto-Scrape Match Results

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'backend/outputs/**'
  schedule:
    - cron: '*/30 * * * *' # Run every 30 minutes
  workflow_dispatch: # Allow running manually from the GitHub Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows pushing the updated JSON files back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper & Re-run Simulations
        run: |
          python backend/scripts/11_results_scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f backend/outputs/*.json
          
          # Only commit and push if new scores were scraped and simulations ran
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): auto-update match scores and re-run simulations [skip render]"
            git push origin main
          else
            echo "No new match results scraped. Skipping commit."
          fi
